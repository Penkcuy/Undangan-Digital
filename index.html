<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Undangan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="cover-box">
    <h1>Undangan Pernikahan</h1>
    <h2 id="namaTamu"></h2>
    <button onclick="bukaUndangan()">Buka Undangan</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content" class="hidden">

  <section data-aos="fade-up">
    <h2 class="couple">Ahmad & Siti</h2>
    <p>Sabtu, 10 Mei 2026</p>
  </section>

  <section data-aos="fade-up">
    <h3>Lokasi</h3>
    <a href="https://maps.google.com" target="_blank">Lihat Google Maps</a>
  </section>

  <section data-aos="fade-up">
    <h3>Galeri</h3>
    <div class="gallery">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
    </div>
  </section>

  <section data-aos="fade-up">
    <h3>Menuju Hari Bahagia</h3>
    <h2 id="countdown"></h2>
  </section>

</div>

<!-- MUSIK -->
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="musik" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>
</body>
</html>
