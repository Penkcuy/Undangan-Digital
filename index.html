<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Undangan</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BUNGA -->
<div class="flowers"></div>

<!-- AMplop -->
<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="envelope-text">Buka Undangan</div>
</div>

<!-- MUSIC -->
<audio id="musik" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔇</button>

<!-- MAIN -->
<div id="main" class="hidden">

<section class="hero">
  <div class="overlay"></div>
  <div class="hero-text">
    <h1>Ahmad & Siti</h1>
    <p>10 Mei 2026</p>
  </div>
</section>

<section>
  <h2>Our Journey</h2>
  <p>Kami dipertemukan oleh takdir...</p>
  <p>Cinta tumbuh perlahan...</p>
  <p>Hingga akhirnya kami bersatu...</p>
</section>

<section>
  <h2>Acara</h2>
  <p>Sabtu, 10 Mei 2026</p>
</section>

<section>
  <h2 id="countdown"></h2>
</section>

<section>
  <h2>Galeri</h2>
  <div class="slider">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
